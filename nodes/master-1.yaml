#cloud-config
hostname: master-1
stages:
  boot:
    - commands:
        - |
          cat > /etc/systemd/network/10-eth0.network <<'NETCONF'
          [Match]
          Name=eth0

          [Network]
          Address=10.0.0.11/24
          Gateway=10.0.0.1
          DNS=10.0.0.1
          NETCONF
          systemctl restart systemd-networkd || true
        - |
          mkdir -p /var/lib/rancher/k3s/server/manifests
          cat > /var/lib/rancher/k3s/server/manifests/kube-vip.yaml <<'MANIFEST'
          apiVersion: v1
          kind: Pod
          metadata:
            name: kube-vip
            namespace: kube-system
          spec:
            hostNetwork: true
            priorityClassName: system-node-critical
            serviceAccountName: default
            containers:
              - name: kube-vip
                image: ghcr.io/kube-vip/kube-vip:v0.8.7
                imagePullPolicy: IfNotPresent
                args:
                  - manager
                env:
                  - name: vip_arp
                    value: "true"
                  - name: address
                    value: "10.0.0.100"
                  - name: port
                    value: "6443"
                  - name: vip_interface
                    value: "eth0"
                  - name: cp_enable
                    value: "true"
                  - name: cp_namespace
                    value: "kube-system"
                securityContext:
                  capabilities:
                    add:
                      - NET_ADMIN
                      - NET_RAW
                      - SYS_TIME
                volumeMounts:
                  - mountPath: /etc/kubernetes/admin.conf
                    name: kubeconfig
            volumes:
              - name: kubeconfig
                hostPath:
                  path: /etc/rancher/k3s/k3s.yaml
            restartPolicy: Always
          MANIFEST
        - |
          curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --cluster-init --tls-san 10.0.0.100 --node-label node-role=master --node-taint node-role=master:NoSchedule" K3S_TOKEN="super-secret-token" sh -
